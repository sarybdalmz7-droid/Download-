<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>محمل الستوريات والفيديوهات المجاني</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #0f172a;
            color: #f8fafc;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .container {
            background-color: #1e293b;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            text-align: center;
            max-width: 500px;
            width: 90%;
        }
        h1 { color: #38bdf8; margin-bottom: 10px; }
        p { color: #94a3b8; font-size: 14px; margin-bottom: 25px; }
        input[type="text"] {
            width: 100%;
            padding: 14px;
            box-sizing: border-box;
            margin-bottom: 20px;
            border: 2px solid #334155;
            background-color: #0f172a;
            color: #fff;
            border-radius: 8px;
            font-size: 16px;
            outline: none;
            text-align: left;
        }
        input[type="text"]:focus { border-color: #38bdf8; }
        button {
            background-color: #38bdf8;
            color: #0f172a;
            border: none;
            font-weight: bold;
            padding: 14px 30px;
            font-size: 16px;
            border-radius: 8px;
            cursor: pointer;
            width: 100%;
            transition: 0.3s;
        }
        button:hover { background-color: #0ea5e9; }
        #result { margin-top: 25px; }
        .download-btn {
            background-color: #22c55e;
            color: white;
            text-decoration: none;
            display: inline-block;
            padding: 12px 25px;
            border-radius: 6px;
            font-weight: bold;
            margin-top: 10px;
            width: 100%;
            box-sizing: border-box;
        }
        .download-btn:hover { background-color: #16a34a; }
        .error { color: #f43f5e; font-weight: bold; }
        .loading { color: #eab308; }
    </style>
</head>
<body>

<div class="container">
    <h1>🚀 محمل الميديا الذكي</h1>
    <p>قم بلصق رابط الستوري، الريلز، أو الفيديو (تيك توك، إنستغرام، يوتيوب..)</p>
    
    <input type="text" id="videoUrl" placeholder="https://www.instagram.com/...">
    <button onclick="fetchVideo()">استخراج رابط التحميل المباشر</button>

    <div id="result"></div>
</div>

<script>
    async function fetchVideo() {
        const urlInput = document.getElementById('videoUrl').value.trim();
        const resultDiv = document.getElementById('result');
        
        if (!urlInput) {
            resultDiv.innerHTML = '<p class="error">الرجاء إدخال الرابط أولاً!</p>';
            return;
        }

        resultDiv.innerHTML = '<p class="loading">جاري معالجة الرابط واستخراج الفيديو سحابياً... انتظر ثواني ⏳</p>';

        try {
            // باستخدام خادم ميديا مفتوح ومجاني (Cobalt API الشغال بكفاءة عالية)
            const response = await fetch('https://api.cobalt.tools/api/json', {
                method: 'POST',
                headers: {
                    'Accept': 'application/json',
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    url: urlInput,
                    videoQuality: '720',
                    audioFormat: 'mp3',
                    downloadMode: 'auto'
                })
            });

            const data = await response.json();

            if (data && data.url) {
                // إذا نجح الـ API في استخراج الرابط المباشر للفيديو أو الستوري
                resultDiv.innerHTML = `
                    <p style="color: #22c55e; font-weight: bold;">تم استخراج الفيديو بنجاح! 🎉</p>
                    <a href="${data.url}" target="_blank" class="download-btn" download>اضغط هنا لحفظ الفيديو فوراً 📥</a>
                `;
            } else if (data && data.status === 'stream') {
                // بعض الروابط تعود كـ Stream مباشر
                resultDiv.innerHTML = `
                    <p style="color: #22c55e; font-weight: bold;">تم تجهيز البث! 🎉</p>
                    <a href="${data.picker[0].url}" target="_blank" class="download-btn">اضغط هنا للتحميل 📥</a>
                `;
            } else {
                throw new Error("لم يتمكن السيرفر السحابي من قراءة الرابط");
            }

        } catch (error) {
            // حل بديل ذكي وتلقائي خاص بإنستغرام إذا فشل الـ API الأول (تغيير الرابط برمجياً لـ ddinstagram)
            if (urlInput.includes("instagram.com")) {
                const downloadLink = urlInput.replace("instagram.com", "ddinstagram.com");
                resultDiv.innerHTML = `
                    <p style="color: #eab308;">طريقة بديلة سريعة لإنستغرام جاهزة:</p>
                    <a href="${downloadLink}" target="_blank" class="download-btn">اضغط هنا لمشاهدة وحفظ الفيديو مباشرة 📥</a>
                `;
            } else {
                resultDiv.innerHTML = '<p class="error">عذراً، فشل استخراج الميديا. تأكد أن الحساب "عام" (Public) وليس خاصاً، أو جرب رابطاً آخر.</p>';
            }
        }
    }
</script>

</body>
</html>
